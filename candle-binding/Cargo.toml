# Note: Benchmark binaries are located in ../bench/scripts/rust/candle-binding/
# They are not included in the library build to keep it self-contained.
# To run benchmarks, use the workspace-level Cargo.toml or run them directly from the bench directory.

# NOTE: The previous `[patch."https://github.com/huggingface/candle"]` block was
# replaced 2026-05-14 by direct path deps in the `[dependencies]` section above.
# Cargo's `[patch]` requires semver-compatible versions and refused to apply
# across the 0.9.2-alpha.1 -> 0.10.2 version gap. Direct path deps bypass that.
