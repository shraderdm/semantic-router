[package]
name = "candle-semantic-router"
version = "0.2.0"
edition = "2021"
description = "Go bindings for Candle BERT semantic similarity model for LLM routing"
license = "MIT OR Apache-2.0"

[lib]
name = "candle_semantic_router"
# Order: rlib for Rust-to-Rust linking, staticlib for C/Go FFI (static), cdylib for dynamic linking
crate-type = ["rlib", "staticlib", "cdylib"]

[features]
default = ["cuda"]
# CUDA support (enables GPU acceleration)
cuda = ["candle-core/cuda", "candle-nn/cuda", "candle-transformers/cuda"]
# Flash Attention 2 support (requires CUDA and compatible GPU)
# Enable with: cargo build --features flash-attn
# Note: Requires CUDA Compute Capability >= 8.0 (Ampere or newer)
flash-attn = ["cuda", "candle-flash-attn"]
# Intel MKL support for faster CPU inference (Linux/Windows)
# Enable with: cargo build --no-default-features --features mkl
# Requires: Intel MKL libraries installed
mkl = ["candle-core/mkl", "candle-nn/mkl", "candle-transformers/mkl"]
# macOS Accelerate framework support for faster CPU inference
# Enable with: cargo build --no-default-features --features accelerate
accelerate = ["candle-core/accelerate", "candle-nn/accelerate", "candle-transformers/accelerate"]

[dependencies]
anyhow = { version = "1", features = ["backtrace"] }
# DEMO DEPS: pinned to shraderdm/candle's cua-demo-merged branch which carries
# both wip/siglip2-port (PR #3510 - SigLIP2 NaFlex port, cosine 0.9996 vs PyTorch
# reference) and wip/candle-core-antialias (PR #3512 - antialias kernel) merged.
# These will move back to the upstream tag once those candle PRs land.
#
# UPSTREAM-BOUND (FOR WHEN CANDLE PRs MERGE):
# candle-core = { version = "0.9.2-alpha.1", git = "https://github.com/huggingface/candle", tag = "0.9.2-alpha.1" }
# candle-nn = { version = "0.9.2-alpha.1", git = "https://github.com/huggingface/candle", tag = "0.9.2-alpha.1" }
# candle-transformers = { version = "0.9.2-alpha.1", git = "https://github.com/huggingface/candle", tag = "0.9.2-alpha.1" }
candle-core = { git = "https://github.com/shraderdm/candle.git", rev = "bf35cbadc15b2c7a63edb77534c46b1799a3493e" }
candle-nn = { git = "https://github.com/shraderdm/candle.git", rev = "bf35cbadc15b2c7a63edb77534c46b1799a3493e" }
candle-transformers = { git = "https://github.com/shraderdm/candle.git", rev = "bf35cbadc15b2c7a63edb77534c46b1799a3493e" }
candle-flash-attn = { git = "https://github.com/shraderdm/candle.git", rev = "bf35cbadc15b2c7a63edb77534c46b1799a3493e", optional = true }
tokenizers = { version = "0.21.0", default-features = false, features = ["http", "onig"] }
hf-hub = { version = "0.4.1", default-features = false, features = ["rustls-tls"] }
safetensors = "0.4.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.93"
tracing = "0.1.37"
libc = "0.2.147"
rand = "0.9.3"
# Performance optimization: parallel processing and lock-free initialization
rayon = "1.8"
parking_lot = "0.12"
crossbeam-channel = "0.5"  # Efficient multi-channel select for scheduler wakeup

[dev-dependencies]
rstest = "0.18"
tokio = { version = "1.0", features = ["full"] }
tempfile = "3.8"
serial_test = "3.0"
criterion = "0.5"
async-std = { version = "1.12", features = ["attributes"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }
ureq = "2.9"
base64 = "0.22"

# Example testing LoRA adapter compatibility with ModernBERT-base-32k
[[example]]
name = "test_lora_compatibility_32k"
path = "examples/test_lora_compatibility_32k.rs"

# Example testing full inference with LoRA adapters on ModernBERT-base-32k
[[example]]
name = "test_lora_inference_32k"
path = "examples/test_lora_inference_32k.rs"

# Example listing safetensors keys
[[example]]
name = "list_safetensors_keys"
path = "examples/list_safetensors_keys.rs"

# Example testing long text inference (8K, 16K, 32K tokens)
[[example]]
name = "test_long_text_inference_32k"
path = "examples/test_long_text_inference_32k.rs"

# Example testing ModernBERT-base-32k comprehensive validation
[[example]]
name = "test_modernbert_32k_validation"
path = "examples/test_modernbert_32k_validation.rs"

# Example testing classifier compatibility with Extended32K (Phase 1.5)
[[example]]
